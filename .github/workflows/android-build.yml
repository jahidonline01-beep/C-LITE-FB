name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/cfb/fblite
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

      - name: Setup Gradle project files
        run: |
          if [ -f root_build.gradle ]; then
            cp root_build.gradle build.gradle
          else
            cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF
          fi

          if [ ! -f settings.gradle ]; then
            cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CLiteFB"
          include ':app'
          EOF
          fi

          if [ ! -f gradle.properties ]; then
            cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF
          fi

          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cp MainActivity.kt            app/src/main/java/com/cfb/fblite/MainActivity.kt
          cp AndroidManifest.xml        app/src/main/AndroidManifest.xml
          cp activity_main.xml          app/src/main/res/layout/activity_main.xml
          cp cookie_indicator_icon.png  app/src/main/res/drawable/cookie_indicator_icon.png
          cp btn_cookie_bg.xml          app/src/main/res/drawable/btn_cookie_bg.xml
          cp ic_cookie_c.xml            app/src/main/res/drawable/ic_cookie_c.xml
          cp ic_launcher_background.xml app/src/main/res/drawable/ic_launcher_background.xml
          cp ic_launcher_foreground.xml app/src/main/res/drawable/ic_launcher_foreground.xml
          cp ic_launcher.xml            app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          cp ic_launcher_round.xml      app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cp colors.xml                 app/src/main/res/values/colors.xml
          cp strings.xml                app/src/main/res/values/strings.xml
          cp themes.xml                 app/src/main/res/values/themes.xml
          cp network_security.xml       app/src/main/res/xml/network_security.xml
          cp app_build.gradle           app/build.gradle
          cp proguard-rules.pro         app/proguard-rules.pro

      - name: Build Debug APK
        run: |
          chmod +x gradlew 2>/dev/null || true
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle wrapper --gradle-version=8.6 --distribution-type=bin
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: C-LITE-FB-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
